"""
edX GraphQL Schema
Conceptual schema derived from the Open edX REST API surface covering:
course catalog, enrollment, grades, certificates, user profiles, learner activity,
content blocks, discussions, enterprise, and LTI integrations.
"""

schema {
  query: Query
  mutation: Mutation
}

# ─────────────────────────────────────────────
# Root Query
# ─────────────────────────────────────────────

type Query {
  # Course Catalog
  course(courseId: ID!): Course
  courses(filter: CourseFilter, pagination: PaginationInput): CourseConnection
  courseRun(courseRunId: ID!): CourseRun
  courseRuns(filter: CourseRunFilter, pagination: PaginationInput): CourseRunConnection
  courseBlock(usageKey: ID!): CourseBlock
  courseBlocks(courseId: ID!, blockType: BlockType): [CourseBlock!]!

  # Enrollment
  enrollment(username: String!, courseId: ID!): Enrollment
  enrollments(username: String!, filter: EnrollmentFilter): [Enrollment!]!
  courseEnrollments(courseId: ID!, pagination: PaginationInput): EnrollmentConnection

  # Grades
  courseGrade(username: String!, courseId: ID!): CourseGrade
  courseGrades(courseId: ID!, pagination: PaginationInput): CourseGradeConnection
  subsectionGrades(username: String!, courseId: ID!): [SubsectionGrade!]!

  # Certificates
  certificate(username: String!, courseId: ID!): Certificate
  certificates(username: String!): [Certificate!]!

  # User Profiles
  user(username: String!): User
  users(filter: UserFilter, pagination: PaginationInput): UserConnection
  userProfile(username: String!): UserProfile
  userPreferences(username: String!): UserPreferences

  # Learner Activity
  learnerActivity(username: String!, courseId: ID!): LearnerActivity
  courseCompletions(courseId: ID!, pagination: PaginationInput): CourseCompletionConnection

  # Discussions
  discussion(courseId: ID!): Discussion
  discussionTopics(courseId: ID!): [DiscussionTopic!]!
  discussionThread(threadId: ID!): DiscussionThread
  discussionThreads(courseId: ID!, filter: ThreadFilter, pagination: PaginationInput): DiscussionThreadConnection

  # Enterprise
  enterpriseCustomer(enterpriseId: ID!): EnterpriseCustomer
  enterpriseCatalog(catalogId: ID!): EnterpriseCatalog
  enterpriseEnrollments(enterpriseId: ID!, pagination: PaginationInput): EnrollmentConnection

  # LTI
  ltiProvider(providerId: ID!): LTIProvider
  ltiProviders: [LTIProvider!]!

  # Programs
  program(programId: ID!): Program
  programs(filter: ProgramFilter, pagination: PaginationInput): ProgramConnection

  # Organizations
  organization(orgKey: String!): Organization
  organizations(pagination: PaginationInput): OrganizationConnection

  # Tags / Taxonomy
  taxonomies: [Taxonomy!]!
  taxonomy(taxonomyId: ID!): Taxonomy
}

# ─────────────────────────────────────────────
# Root Mutation
# ─────────────────────────────────────────────

type Mutation {
  # Enrollment mutations
  enrollUser(input: EnrollUserInput!): EnrollUserPayload!
  unenrollUser(input: UnenrollUserInput!): UnenrollUserPayload!
  updateEnrollmentMode(input: UpdateEnrollmentModeInput!): UpdateEnrollmentModePayload!

  # Certificate mutations
  generateCertificate(input: GenerateCertificateInput!): GenerateCertificatePayload!
  invalidateCertificate(input: InvalidateCertificateInput!): InvalidateCertificatePayload!

  # User profile mutations
  updateUserProfile(input: UpdateUserProfileInput!): UpdateUserProfilePayload!
  updateUserPreferences(input: UpdateUserPreferencesInput!): UpdateUserPreferencesPayload!

  # Discussion mutations
  createDiscussionThread(input: CreateDiscussionThreadInput!): CreateDiscussionThreadPayload!
  replyToThread(input: ReplyToThreadInput!): ReplyToThreadPayload!
  flagContent(input: FlagContentInput!): FlagContentPayload!

  # Grade override
  overrideGrade(input: OverrideGradeInput!): OverrideGradePayload!
}

# ─────────────────────────────────────────────
# Course Types
# ─────────────────────────────────────────────

type Course {
  id: ID!
  courseId: String!
  title: String!
  shortDescription: String
  fullDescription: String
  organization: Organization
  runs: [CourseRun!]!
  programs: [Program!]!
  skills: [Skill!]!
  tags: [Tag!]!
  image: CourseImage
  marketingUrl: String
  effort: String
  subjects: [Subject!]!
  prerequisites: [String!]!
  syllabus: String
  level: CourseLevel
  language: String
  additionalLanguages: [String!]!
  activeCourseRunKey: String
  enrollmentCount: Int
  expectedLearningItems: [String!]!
  instructors: [Instructor!]!
  sponsoringOrganizations: [Organization!]!
  created: DateTime!
  modified: DateTime!
}

type CourseRun {
  id: ID!
  key: String!
  title: String!
  course: Course
  status: CourseRunStatus!
  start: DateTime
  end: DateTime
  enrollmentStart: DateTime
  enrollmentEnd: DateTime
  pacing: CoursePacing!
  seats: [Seat!]!
  minEffort: Int
  maxEffort: Int
  weeksToComplete: Int
  language: String
  mobileAvailable: Boolean!
  enrollable: Boolean!
  marketingUrl: String
  instructionMode: InstructionMode
  lmsUrl: String
  externalKey: String
  enrollmentCount: Int
  created: DateTime!
  modified: DateTime!
}

type CourseBlock {
  id: ID!
  usageKey: String!
  blockId: String!
  courseId: String!
  blockType: BlockType!
  displayName: String
  studentViewData: JSON
  studentViewMultiDevice: Boolean
  students_view_url: String
  lmsWebUrl: String
  children: [CourseBlock!]!
  hasScorePossible: Boolean
  completion: Float
}

type CourseImage {
  raw: String
  small: String
  medium: String
  large: String
}

type Seat {
  type: SeatType!
  price: String
  currency: String
  upgradeDeadline: DateTime
  creditProvider: String
  creditHours: Int
  sku: String
}

type Instructor {
  key: String!
  name: String!
  title: String
  organization: String
  bio: String
  image: String
  profileImageUrl: String
  majorWorks: String
  urls: InstructorUrls
}

type InstructorUrls {
  facebook: String
  twitter: String
  blog: String
}

# ─────────────────────────────────────────────
# Enrollment Types
# ─────────────────────────────────────────────

type Enrollment {
  id: ID!
  user: User!
  courseRun: CourseRun
  courseId: String!
  isActive: Boolean!
  mode: EnrollmentMode!
  created: DateTime!
  upgradeDeadline: DateTime
  auditAccessExpires: DateTime
  courseStart: DateTime
  courseEnd: DateTime
