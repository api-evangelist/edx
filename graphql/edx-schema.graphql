  accountPrivacy: AccountPrivacy!
  profileImage: ProfileImage
  requiresParentalConsent: Boolean
}

type UserPreferences {
  username: String!
  preferences: [UserPreference!]!
}

type UserPreference {
  key: String!
  value: String!
}

type ProfileImage {
  hasImage: Boolean!
  imageUrlFull: String
  imageUrlLarge: String
  imageUrlMedium: String
  imageUrlSmall: String
}

type LanguageProficiency {
  code: String!
}

type SocialLink {
  platform: String!
  socialLink: String!
}

# ─────────────────────────────────────────────
# Learner Activity / Completion Types
# ─────────────────────────────────────────────

type LearnerActivity {
  username: String!
  courseId: String!
  daysActive: Int
  lastActivity: DateTime
  completionSummary: CompletionSummary
  sectionsCompleted: Int
  sectionsTotal: Int
  videosWatched: Int
  problemsAttempted: Int
  problemsPassed: Int
}

type CompletionSummary {
  completionMean: Float
  completionMedian: Float
  complete: Boolean!
  percentCompleted: Float!
}

type CourseCompletion {
  username: String!
  courseId: String!
  complete: Boolean!
  completionDate: DateTime
  percentCompleted: Float!
}

# ─────────────────────────────────────────────
# Discussion Types
# ─────────────────────────────────────────────

type Discussion {
  courseId: String!
  provider: String
  topics: [DiscussionTopic!]!
  settings: DiscussionSettings
}

type DiscussionSettings {
  allowAnonymousPosts: Boolean
  allowAnonymousPostsToPeers: Boolean
  allowDivisionByCohortsInCourseWide: Boolean
  allowDivisionByCohortsInContentGrouped: Boolean
  reportedContentEmailNotifications: Boolean
  postingRestrictions: String
}

type DiscussionTopic {
  id: ID!
  courseId: String!
  name: String!
  externalLinks: [String!]!
  enabled: Boolean!
  usageKey: String
  threadListUrl: String
}

type DiscussionThread {
  id: ID!
  courseId: String!
  topic: DiscussionTopic
  author: User
  title: String!
  body: String!
  threadType: ThreadType!
  commentCount: Int!
  voteCount: Int!
  flagged: Boolean!
  abuse_flagged: Boolean
  read: Boolean
  unreadCommentCount: Int
  endorsed: Boolean!
  pinned: Boolean!
  closed: Boolean!
  closedBy: User
  responses: [DiscussionResponse!]!
  created: DateTime!
  updated: DateTime!
}

type DiscussionResponse {
  id: ID!
  thread: DiscussionThread
  author: User
  body: String!
  endorsed: Boolean!
  voteCount: Int!
  flagged: Boolean!
  created: DateTime!
  updated: DateTime!
  children: [DiscussionResponse!]!
}

