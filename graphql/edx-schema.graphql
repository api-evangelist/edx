# ─────────────────────────────────────────────
# Connection / Pagination Types
# ─────────────────────────────────────────────

type CourseConnection {
  nodes: [Course!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type CourseRunConnection {
  nodes: [CourseRun!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type EnrollmentConnection {
  nodes: [Enrollment!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type CourseGradeConnection {
  nodes: [CourseGrade!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type CourseCompletionConnection {
  nodes: [CourseCompletion!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type DiscussionThreadConnection {
  nodes: [DiscussionThread!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ProgramConnection {
  nodes: [Program!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type OrganizationConnection {
  nodes: [Organization!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type UserConnection {
  nodes: [User!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  page: Int
  pageSize: Int
  totalPages: Int
}

# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────

input PaginationInput {
  page: Int
  pageSize: Int
  cursor: String
}

input CourseFilter {
  organizationKey: String
  subject: String
  level: CourseLevel
  language: String
  availability: CourseAvailability
  query: String
  tags: [String!]
  programType: ProgramType
}

input CourseRunFilter {
  courseId: ID
  status: CourseRunStatus
  pacing: CoursePacing
  enrollable: Boolean
}

input EnrollmentFilter {
  isActive: Boolean
  mode: EnrollmentMode
  courseId: ID
}

input UserFilter {
  query: String
  isActive: Boolean
  isStaff: Boolean
}

input ThreadFilter {
  topicId: ID
  threadType: ThreadType
  authorUsername: String
  flagged: Boolean
  endorsed: Boolean
  orderBy: ThreadOrderBy
}

input ProgramFilter {
  type: ProgramType
  status: ProgramStatus
  organizationKey: String
  subject: String
}

# Mutation Inputs

input EnrollUserInput {
  username: String!
  courseId: ID!
  mode: EnrollmentMode!
  emailStudents: Boolean
}

input UnenrollUserInput {
  username: String!
  courseId: ID!
}

input UpdateEnrollmentModeInput {
  username: String!
  courseId: ID!
  mode: EnrollmentMode!
}

input GenerateCertificateInput {
  username: String!
  courseId: ID!
  generateMode: CertificateGenerateMode
}

input InvalidateCertificateInput {
  username: String!
  courseId: ID!
  reason: String
}

input UpdateUserProfileInput {
  username: String!
  name: String
  bio: String
  country: String
  city: String
  yearOfBirth: Int
  gender: Gender
  levelOfEducation: EducationLevel
  goals: String
}

input UpdateUserPreferencesInput {
  username: String!
  preferences: [UserPreferenceInput!]!
}

input UserPreferenceInput {
  key: String!
  value: String!
}

input CreateDiscussionThreadInput {
  courseId: ID!
  topicId: ID!
  title: String!
  body: String!
  threadType: ThreadType!
  anonymous: Boolean
}

input ReplyToThreadInput {
  threadId: ID!
  body: String!
  parentId: ID
  endorsed: Boolean
}

input FlagContentInput {
  contentId: ID!
  contentType: DiscussionContentType!
  reason: String
}

input OverrideGradeInput {
  username: String!
  courseId: ID!
  subsectionId: ID
  gradeEarned: Float!
  gradePossible: Float!
  overrideReason: String!
}

# ─────────────────────────────────────────────
# Payload Types
# ─────────────────────────────────────────────

type EnrollUserPayload {
  enrollment: Enrollment
  errors: [UserError!]!
}

type UnenrollUserPayload {
  success: Boolean!
  errors: [UserError!]!
}

type UpdateEnrollmentModePayload {
  enrollment: Enrollment
  errors: [UserError!]!
}

type GenerateCertificatePayload {
  certificate: Certificate
  errors: [UserError!]!
}

type InvalidateCertificatePayload {
  success: Boolean!
  errors: [UserError!]!
}

type UpdateUserProfilePayload {
  userProfile: UserProfile
  errors: [UserError!]!
}

type UpdateUserPreferencesPayload {
  userPreferences: UserPreferences
  errors: [UserError!]!
}

type CreateDiscussionThreadPayload {
  thread: DiscussionThread
  errors: [UserError!]!
}

type ReplyToThreadPayload {
  response: DiscussionResponse
  errors: [UserError!]!
}

type FlagContentPayload {
  success: Boolean!
  errors: [UserError!]!
}

type OverrideGradePayload {
  gradeOverride: GradeOverride
  errors: [UserError!]!
}

type UserError {
  field: String
  message: String!
  code: String
}

