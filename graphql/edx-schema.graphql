}

type GradeCourseData {
  courseBlocked: Boolean
  courseFailed: Boolean
  courseCompleted: Boolean
  gradeBreakdown: [GradeBreakdown!]!
}

type GradeBreakdown {
  category: String!
  percent: Float!
  detail: String
}

type SubsectionGrade {
  id: ID!
  subsectionId: String!
  displayName: String!
  attempted: Boolean!
  pointsEarned: Float
  pointsPossible: Float
  percentGraded: Float
  gradeType: GradeType
  created: DateTime!
  modified: DateTime!
}

type GradeOverride {
  overrideReason: String
  overriddenBy: String
  overriddenAt: DateTime
  system: Boolean
  gradePossible: Float
  gradeEarned: Float
}

# ─────────────────────────────────────────────
# Certificate Types
# ─────────────────────────────────────────────

type Certificate {
  id: ID!
  username: String!
  courseId: String!
  type: CertificateType!
  status: CertificateStatus!
  mode: String
  grade: String
  isValid: Boolean!
  downloadUrl: String
  downloadUuid: String
  verifyUuid: String
  created: DateTime!
  modified: DateTime!
}

# ─────────────────────────────────────────────
# User / Profile Types
# ─────────────────────────────────────────────

type User {
  id: ID!
  username: String!
  email: String!
  name: String
  isActive: Boolean!
  isStaff: Boolean!
  dateJoined: DateTime!
  lastLogin: DateTime
  profile: UserProfile
  preferences: UserPreferences
  enrollments: [Enrollment!]!
  certificates: [Certificate!]!
}

type UserProfile {
  id: ID!
  username: String!
  name: String
  bio: String
  languageProficiencies: [LanguageProficiency!]!
  country: String
  city: String
  email: String
  mailing_address: String
  gender: Gender
  yearOfBirth: Int
  levelOfEducation: EducationLevel
  goals: String
